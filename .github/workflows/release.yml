name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Delete old prerelease
        if: github.ref == 'refs/heads/main'
        run: gh release delete dev --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/burlesco.user.js
          tag_name: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Development Build' || github.ref_name }}
          prerelease: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
