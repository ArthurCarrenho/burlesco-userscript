env:
  browser: true
  webextensions: true
  greasemonkey: true
parserOptions:
  ecmaVersion: 2020
  sourceType: module
extends: 'eslint:recommended'
rules:
  indent:
    - error
    - 2
  linebreak-style:
    - error
    - unix
  quotes:
    - error
    - single
  semi:
    - error
    - always
  max-len:
    - off
